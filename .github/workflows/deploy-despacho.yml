name: Deploy Backend Despacho

on:
  push:
    branches:
      - deploy
    paths:
      - 'Springboot-API-REST-DESPACHO/**' # Solo se activa si cambias algo en esta carpeta

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Imagen Backend
        run: |
          cd Springboot-API-REST-DESPACHO
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest

      - name: Despliegue en AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest
            docker stop backend_despacho || true
            docker rm backend_despacho || true
            docker run -d -p 8081:8081 --name backend_despacho ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest
