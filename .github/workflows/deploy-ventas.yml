name: Deploy Backend Ventas

on:
  push:
    branches:
      - deploy
    paths:
      - 'Springboot-API-REST/**' # Se activa solo si hay cambios en esta carpeta

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Imagen Backend Ventas
        run: |
          cd Springboot-API-REST
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest

      - name: Despliegue en AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
            docker stop backend_ventas || true
            docker rm backend_ventas || true
            # Usamos el puerto 8082 para evitar conflictos
            docker run -d -p 8082:8082 --name backend_ventas ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
