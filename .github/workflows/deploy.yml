name: CI/CD Pipeline AWS EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build y Push de la imagen Docker
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest

    - name: Despliegue en AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
          # Nota: En el próximo paso crearemos el docker-compose.yml en el servidor
          docker stop frontend_react || true
          docker rm frontend_react || true
          docker run -d -p 80:80 --name frontend_react ${{ secrets.DOCKER_USERNAME }}/frontend-despacho:latest
